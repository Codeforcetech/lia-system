services:
  db:
    image: postgres:16
    container_name: lia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lia
    ports:
      - "5432:5432"
    volumes:
      - lia_pgdata:/var/lib/postgresql/data

volumes:
  lia_pgdata:

